name: 가격 변동 알림 봇

on:
  schedule:
    - cron: "0 * * * *"   # 매시간 정각 실행 (UTC 기준, 한국시간 +9시간)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  check-prices:
    runs-on: ubuntu-latest
    concurrency:
      group: price-check
      cancel-in-progress: false  # 이전 실행 중이면 기다렸다가 실행

    permissions:
      contents: write            # products.csv 자동 저장을 위한 쓰기 권한

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 경고 제거

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 가격 변동 체크
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PRODUCTS_CSV:     products.csv
        run: python price_checker.py

      - name: products.csv 변경사항 저장
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products.csv
          git diff --cached --quiet || \
            git commit -m "chore: 가격 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
